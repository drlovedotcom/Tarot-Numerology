<!DOCTYPE html>
<!-- saved from url=(0056)file:///Volumes/Div.%202024/Tarot/Tarot%20Numerology.htm -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#18181b">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>Tarot Numerology</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #18181b; 
            color: #f4f4f5; 
            display: flex; 
            justify-content: center; 
            padding: 3rem 1rem;
        }
        .container { 
            background-color: #27272a; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 400px; 
        }
        h1 { margin-top: 0; font-size: 1.5rem; color: #e4e4e7; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: #a1a1aa; }
        input { 
            width: 100%; 
            padding: 0.75rem; 
            background: #3f3f46; 
            border: 1px solid #52525b; 
            border-radius: 6px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        button { 
            width: 100%; 
            background-color: #f4f4f5; 
            color: #09090b; 
            border: none; 
            padding: 0.875rem; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #e4e4e7; }
        
        .results { 
            margin-top: 2rem; 
            padding-top: 2rem; 
            border-top: 1px solid #52525b; 
            display: none; 
        }
        .result-item { margin-bottom: 1.5rem; }
        .result-item:last-child { margin-bottom: 0; }
        .result-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #a1a1aa; margin-bottom: 0.25rem; }
        .result-value { font-size: 1.25rem; font-weight: 600; color: #f4f4f5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculate Your Cards</h1>
        
        <div class="form-group">
            <label for="bDay">Day of Birth</label>
            <input type="number" id="bDay" min="1" max="31" value="13">
        </div>
        <div class="form-group">
            <label for="bMonth">Month of Birth</label>
            <input type="number" id="bMonth" min="1" max="12" value="3">
        </div>
        <div class="form-group">
            <label for="bYear">Year of Birth</label>
            <input type="number" id="bYear" min="1900" max="2100" value="1973">
        </div>
        <div class="form-group">
            <label for="tYear">Target Year (Growth Card)</label>
            <input type="number" id="tYear" min="1900" max="2100" value="2026">
        </div>

        <button onclick="calculateTarot()">Reveal Cards</button>

        <div class="results" id="resultsArea">
            <div class="result-item">
                <div class="result-label">Personlighedskort</div>
                <div class="result-value" id="outPersonality"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Væsenskort</div>
                <div class="result-value" id="outSoul"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Vækstkort</div>
                <div class="result-value" id="outGrowth"></div>
            </div>
        </div>
    </div>

    <script>
        const majorArcana = {
            1: "1 - The Magician", 2: "2 - The High Priestess", 3: "3 - The Empress",
            4: "4 - The Emperor", 5: "5 - The Hierophant", 6: "6 - The Lovers",
            7: "7 - The Chariot", 8: "8 - Strength", 9: "9 - The Hermit",
            10: "10 - Wheel of Fortune", 11: "11 - Justice", 12: "12 - The Hanged Man",
            13: "13 - Death", 14: "14 - Temperance", 15: "15 - The Devil",
            16: "16 - The Tower", 17: "17 - The Star", 18: "18 - The Moon",
            19: "19 - The Sun", 20: "20 - Judgement", 21: "21 - The World",
            22: "22 - The Fool" 
        };

        function getTværsum(num) {
            return num.toString().split('').reduce((acc, val) => acc + parseInt(val), 0);
        }

        function calculateTarot() {
            const day = parseInt(document.getElementById('bDay').value);
            const month = parseInt(document.getElementById('bMonth').value);
            const year = parseInt(document.getElementById('bYear').value);
            const targetYear = parseInt(document.getElementById('tYear').value);

            if (!day || !month || !year || !targetYear) return;

            // 1. Personlighedskort
            const baseSum = day + month + year;
            let firstTværsum = getTværsum(baseSum);
            let personalityNum = firstTværsum > 22 ? getTværsum(firstTværsum) : firstTværsum;

            // 2. Væsenskort
            let soulNum = getTværsum(personalityNum);

            // 3. Vækstkort
            const growthBase = day + month + targetYear;
            let growthTværsum = getTværsum(growthBase);
            let growthNum = growthTværsum;
            
            // Undtagelsen: Er tallet over 22 tages tværsummen, medmindre det ER 22 (Narren)
            if (growthTværsum > 22 && growthTværsum !== 22) {
                growthNum = getTværsum(growthTværsum);
            }

            document.getElementById('outPersonality').innerText = majorArcana[personalityNum] || personalityNum;
            document.getElementById('outSoul').innerText = majorArcana[soulNum] || soulNum;
            document.getElementById('outGrowth').innerText = majorArcana[growthNum] || growthNum;

            document.getElementById('resultsArea').style.display = 'block';
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registreret!'))
                    .catch(err => console.error('Service Worker fejlede:', err));
            });
        }
    </script>

</body></html>
